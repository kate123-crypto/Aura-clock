document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

); --dot:rgba(0,0,0,.12); }\n\n  .stage { position: relative; width: min(92vmin, 480px); aspect-ratio: 1; display: flex; align-items: center; justify-content: center; }\n\n  .aura-wrap { position: absolute; inset: 0; display: grid; place-items: center; }\n  .aura {\n    position: absolute; border-radius: 50%;\n    animation: breathe 7s ease-in-out infinite;\n    will-change: transform, opacity;\n  }\n  body[data-theme=\"dark\"] .aura, body[data-theme=\"charcoal\"] .aura { mix-blend-mode: screen; }\n\n  @keyframes breathe {\n    0%, 100% { transform: scale(1) rotate(0deg); opacity: var(--auraMax,.42); }\n    33%      { transform: scale(1.18) rotate(8deg); opacity: var(--auraMax,.42); }\n    66%      { transform: scale(.92) rotate(-5deg); opacity: calc(var(--auraMax,.42) * .55); }\n  }\n\n  .ring { position: absolute; border-radius: 50%; border: 1px solid var(--muted); pointer-events: none; }\n  .ring.r1 { width: 86%; height: 86%; }\n  .ring.r2 { width: 78%; height: 78%; animation: spin 120s linear infinite; }\n  .ring.r3 { width: 70%; height: 70%; animation: spin 90s linear infinite reverse; }\n  @keyframes spin { to { transform: rotate(360deg); } }\n\n  .ticks { position: absolute; width: 80%; height: 80%; }\n  .tick {\n    position: absolute; top: 50%; left: 50%;\n    width: 3px; height: 3px; border-radius: 50%;\n    background: var(--dot);\n    transform-origin: 0 0;\n    transition: all .4s ease;\n  }\n  .tick.major { width: 5px; height: 5px; opacity: .85; }\n  .tick.active { width: 7px; height: 7px; background: var(--accent,#f43f5e); box-shadow: 0 0 12px var(--accentGlow,rgba(244,63,94,.65)); }\n\n  .progress { position: absolute; width: 84%; height: 84%; transform: rotate(-90deg); }\n  .progress circle { fill: none; stroke-width: 1.2; stroke-linecap: round; }\n  .progress .track { stroke: var(--muted); }\n  .progress .meter { stroke: url(#auraGradient); transition: stroke-dashoffset .9s ease; }\n\n  .display { position: relative; z-index: 5; text-align: center; }\n  .time {\n    font-size: clamp(48px, 11vmin, 78px);\n    font-weight: 200;\n    letter-spacing: 0.08em;\n    line-height: 1;\n    font-variant-numeric: tabular-nums;\n  }\n  body[data-typeface=\"serif\"] .time { font-family: 'Fraunces', serif; letter-spacing: 0.02em; }\n  body[data-typeface=\"mono\"]  .time { font-family: 'JetBrains Mono', monospace; font-weight: 300; letter-spacing: 0.02em; }\n  .colon { display: inline-block; animation: blink 1s steps(2) infinite; opacity: .6; padding: 0 0.05em; }\n  @keyframes blink { 50% { opacity: 0.15; } }\n  .ampm { font-size: .35em; margin-left: .3em; opacity: .5; letter-spacing: .15em; }\n\n  .seconds { font-size: clamp(13px,2.4vmin,18px); font-weight: 300; opacity: .4; letter-spacing: .18em; margin-top: 6px; font-variant-numeric: tabular-nums; }\n  .meta { margin-top: clamp(10px,2.2vmin,18px); font-size: clamp(10px,1.6vmin,12px); font-weight: 300; letter-spacing: .32em; text-transform: uppercase; opacity: .5; }\n  .greeting { margin-top: 6px; font-size: clamp(11px,1.8vmin,13px); font-weight: 300; letter-spacing: .08em; opacity: .4; font-style: italic; }\n\n  body[data-mode=\"rings\"] .aura { opacity: 0 !important; }\n  body[data-mode=\"minimal\"] .aura, body[data-mode=\"minimal\"] .ring, body[data-mode=\"minimal\"] .ticks { display: none; }\n  body[data-mode=\"minimal\"] .progress .track { opacity: 0; }\n  body[data-rings=\"off\"] .ring { display: none; }\n\n  .noise {\n    position: fixed; inset: 0; pointer-events: none; opacity: .025;\n    background-image: url(\"data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E\");\n  }\n\n  /* Settings panel — toggle via gear */\n  .gear { position: fixed; top: 14px; right: 14px; z-index: 100; width: 32px; height: 32px; border-radius: 50%; border: 0; ata-theme=\"dark\"] .row button, body[data-theme=\"charcoal\"] .row button { background: rgba(255,255,255,.06); color: #ece9e2; border-color: rgba(255,255,255,.12); }\n  body[data-theme=\"dark\"] .row button.on, body[data-theme=\"charcoal\"] .row button.on { background: #ece9e2; color: #1a1a1c; }\n<\u002Fstyle>\n<\u002Fhead>\n<body data-theme=\"light\" data-mode=\"aura\" data-typeface=\"sans\" data-rings=\"on\">\n\n\n\n<div class=\"noise\"><\u002Fdiv>\n\n<button class=\"gear\" id=\"gear\" aria-label=\"Settings\">⚙<\u002Fbutton>\n<div class=\"panel\" id=\"panel\">\n  <h4>Apparence<\u002Fh4>\n  <label><span>Thème<\u002Fspan>\n    <select id=\"theme\">\n      <option value=\"light\">Crème clair<\u002Foption>\n      <option value=\"cream\">Crème chaud<\u002Foption>\n      <option value=\"white\">Blanc pur<\u002Foption>\n      <option value=\"dark\">Sombre<\u002Foption>\n      <option value=\"charcoal\">Charbon<\u002Foption>\n    <\u002Fselect>\n  <\u002Flabel>\n  <label><span>Mode<\u002Fspan><\u002Flabel>\n  <div class=\"row\" data-group=\"mode\">\n    <button data-v=\"aura\" class=\"on\">Aura<\u002Fbutton>\n    <button data-v=\"rings\">Anneaux<\u002Fbutton>\n    <button data-v=\"minimal\">Pur<\u002Fbutton>\n  <\u002Fdiv>\n  <label><span>Police<\u002Fspan><\u002Flabel>\n  <div class=\"row\" data-group=\"typeface\">\n    <button data-v=\"sans\" class=\"on\">Sans<\u002Fbutton>\n    <button data-v=\"serif\">Serif<\u002Fbutton>\n    <button data-v=\"mono\">Mono<\u002Fbutton>\n  <\u002Fdiv>\n\n  <h4>Palette<\u002Fh4>\n  <label><span>Couleurs<\u002Fspan>\n    <select id=\"palette\">\n      <option value=\"spectrum\">Spectre<\u002Foption>\n      <option value=\"ember\">Braise<\u002Foption>\n      <option value=\"ocean\">Océan<\u002Foption>\n      <option value=\"forest\">Forêt<\u002Foption>\n      <option value=\"rose\" selected=\"\">Rose<\u002Foption>\n      <option value=\"mono\">Monochrome<\u002Foption>\n    <\u002Fselect>\n  <\u002Flabel>\n  <label><span>Intensité<\u002Fspan><input type=\"range\" id=\"intensity\" min=\"0\" max=\"1\" step=\"0.05\" value=\"0.42\"><\u002Flabel>\n  <label><span>Flou<\u002Fspan><input type=\"range\" id=\"blur\" min=\"20\" max=\"140\" step=\"2\" value=\"70\"><\u002Flabel>\n  <label><span>Vitesse<\u002Fspan><input type=\"range\" id=\"speed\" min=\"0.2\" max=\"3\" step=\"0.1\" value=\"1\"><\u002Flabel>\n\n  <h4>Affichage<\u002Fh4>\n  <label><span>Format 24h<\u002Fspan><input type=\"checkbox\" id=\"format24\" checked=\"\"><\u002Flabel>\n  <label><span>Secondes<\u002Fspan><input type=\"checkbox\" id=\"showSeconds\"><\u002Flabel>\n  <label><span>Date<\u002Fspan><input type=\"checkbox\" id=\"showDate\" checked=\"\"><\u002Flabel>\n  <label><span>Salutation<\u002Fspan><input type=\"checkbox\" id=\"showGreeting\"><\u002Flabel>\n  <label><span>Anneaux<\u002Fspan><input type=\"checkbox\" id=\"ringsOn\" checked=\"\"><\u002Flabel>\n<\u002Fdiv>\n\n<div class=\"stage\" id=\"stage\">\n  <div class=\"aura-wrap\" id=\"auraWrap\"><\u002Fdiv>\n  <div class=\"ring r1\"><\u002Fdiv>\n  <div class=\"ring r2\"><\u002Fdiv>\n  <div class=\"ring r3\"><\u002Fdiv>\n  <svg class=\"progress\" viewBox=\"0 0 340 340\">\n    <defs>\n      <linearGradient id=\"auraGradient\" x1=\"0%\" y1=\"0%\" x2=\"100%\" y2=\"100%\">\n        <stop id=\"g0\" offset=\"0%\" stop-color=\"#f43f5e\"><\u002Fstop>\n        <stop id=\"g1\" offset=\"50%\" stop-color=\"#ec4899\"><\u002Fstop>\n        <stop id=\"g2\" offset=\"100%\" stop-color=\"#f59e0b\"><\u002Fstop>\n      <\u002FlinearGradient>\n    <\u002Fdefs>\n    <circle class=\"track\" cx=\"170\" cy=\"170\" r=\"168\"><\u002Fcircle>\n    <circle class=\"meter\" cx=\"170\" cy=\"170\" r=\"168\"><\u002Fcircle>\n  <\u002Fsvg>\n  <div class=\"ticks\" id=\"ticks\"><\u002Fdiv>\n  <div class=\"display\">\n    <div class=\"time\">\n      <span id=\"hh\">--<\u002Fspan><span class=\"colon\">:<\u002Fspan><span id=\"mm\">--<\u002Fspan><span id=\"ampm\" class=\"ampm\" style=\"display:none\"><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"seconds\" id=\"seconds\" style=\"display:none\">--<\u002Fdiv>\n    <div class=\"meta\" id=\"meta\"><\u002Fdiv>\n    <div class=\"greeting\" id=\"greeting\" style=\"display:none\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n(function(){\n  var PALETTES = {\n    spectrum: [\"#7c3aed\", \"#2dd4bf\", \"#f472b6\"],\n    ember:    [\"#f97316\", \"#ef4444\", \"#fbbf24\"],\n    ocean:    [\"#0ea5e9\", \"#6366f1\", \"#22d3ee\"],\n    forest:   [\"#10b981\", \"#84cc16\", \"#14b8a6\"],\n    rose:     [\"#f43f5e\", \"#ec4899\", \"#f59e0b\"],\n    mono:     [\"#6b7280\", \"#9ca3af\", \"#4b5563\"]\n  };\n  var DAYS   = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];\n  var MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];\n\n  // Default state — change these defaults to \"freeze\" your preferred look\n  var state = {\n    theme: 'white',\n    mode: 'aura',\n    typeface: 'sans',\n    palette: 'rose',\n    intensity: 0.3,\n    blur: 38,\n    speed: 1,\n    format24: true,\n    showSeconds: false,\n    showDate: true,\n    showGreeting: false,\n    ringsOn: true\n  };\n\n  // Persist user changes locally\n  try { Object.assign(state, JSON.parse(localStorage.getItem('auraClock')||'{}')); } catch(e){}\n  function save(){ try{ localStorage.setItem('auraClock', JSON.stringify(state)); }catch(e){} }\n\n  // Build aura layers\n  var auraWrap = document.getElementById('auraWrap');\n  function buildAuras(){\n    auraWrap.innerHTML = '';\n    var p = PALETTES[state.palette] || PALETTES.rose;\n    for (var i=0;i<3;i++){\n      var el = document.createElement('div');\n      el.className = 'aura';\n      el.style.width = (88 - i*6) + '%';\n      el.style.height = (88 - i*6) + '%';\n      el.style.background = 'radial-gradient(circle, '+p[i]+' 0%, transparent 70%)';\n      el.style.transform = 'translate('+((i-1)*22)+'px, '+((i-1)*-16)+'px)';\n      el.style.animationDelay = (-i*2.2)+'s';\n      el.style.filter = 'blur('+state.blur+'px)';\n      el.style.animationDuration = (7/Math.max(state.speed,0.1))+'s';\n      auraWrap.appendChild(el);\n    }\n    // gradient stops\n    document.getElementById('g0').setAttribute('stop-color', p[0]);\n    document.getElementById('g1').setAttribute('stop-color', p[1]);\n    document.getElementById('g2').setAttribute('stop-color', p[2]);\n    document.documentElement.style.setProperty('--accent', p[0]);\n    document.documentElement.style.setProperty('--accentGlow', p[0]+'99');\n    document.documentElement.style.setProperty('--auraMax', state.intensity);\n  }\n\n  // Build ticks\n  var ticksEl = document.getElementById('ticks');\n  for (var i=0;i<12;i++){\n    var dot = document.createElement('div');\n    dot.className = 'tick' + (i%3===0?' major':'');\n    var a = (i*30 - 90) * (Math.PI/180);\n    var x = Math.cos(a)*152, y = Math.sin(a)*152;\n    dot.style.transform = 'translate('+x+'px, '+y+'px)';\n    ticksEl.appendChild(dot);\n  }\n\n  var meterEl = document.querySelector('.progress .meter');\n  var C = 2*Math.PI*168;\n  meterEl.setAttribute('stroke-dasharray', C);\n\n  function pad(n){ return String(n).padStart(2,'0'); }\n\n  function tick(){\n    var now = new Date();\n    var h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();\n    var displayH = state.format24 ? h : ((h%12)||12);\n    document.getElementById('hh').textContent = pad(displayH);\n    document.getElementById('mm').textContent = pad(m);\n    var ampmEl = document.getElementById('ampm');\n    if (state.format24){ ampmEl.style.display='none'; }\n    else { ampmEl.style.display='inline'; ampmEl.textContent = h<12?'AM':'PM'; }\n\n    document.getElementById('seconds').textContent = pad(s);\n    document.getElementById('seconds').style.display = state.showSeconds?'block':'none';\n\n    document.getElementById('meta').textContent = state.showDate\n      ? (DAYS[now.getDay()] + ' · ' + now.getDate() + ' ' + MONTHS[now.getMonth()])\n      : '';\n\n    var g = '';\n    if (h<5) g='Nuit profonde'; else if (h<12) g='Bonjour'; else if (h<18) g='Bon après-midi'; else if (h<22) g='Bonsoir'; else g='Bonne nuit';\n    var gEl = document.getElementById('greeting');\n    gEl.textContent = g;\n    gEl.style.display = state.showGreeting?'block':'none';\n\n    var frac = (m*60+s)/3600;\n    meterEl.setAttribute('stroke-dashoffset', C*(1-frac));\n    meterEl.style.filter = 'drop-shadow(0 0 4px ' + (PALETTES[state.palette]||PALETTES.rose)[0] + '88)';\n\n    var dots = document.querySelectorAll('.tick');\n    var active = h%12;\n    for (var j=0;j<dots.length;j++) dots[j].classList.toggle('active', j===active);\n  }\n\n  function applyState(){\n    document.body.dataset.theme = state.theme;\n    document.body.dataset.mode = state.mode;\n    document.body.dataset.typeface = state.typeface;\n    document.body.dataset.rings = state.ringsOn ? 'on' : 'off';\n    buildAuras();\n    tick();\n\n    // Sync controls\n    document.getElementById('theme').value = state.theme;\n    document.getElementById('palette').value = state.palette;\n    document.getElementById('intensity').value = state.intensity;\n    document.getElementById('blur').value = state.blur;\n    document.getElementById('speed').value = state.speed;\n    document.getElementById('format24').checked = state.format24;\n    document.getElementById('showSeconds').checked = state.showSeconds;\n    document.getElementById('showDate').checked = state.showDate;\n    document.getElementById('showGreeting').checked = state.showGreeting;\n    document.getElementById('ringsOn').checked = state.ringsOn;\n    document.querySelectorAll('[data-group=\"mode\"] button').forEach(function(b){ b.classList.toggle('on', b.dataset.v===state.mode); });\n    document.querySelectorAll('[data-group=\"typeface\"] button').forEach(function(b){ b.classList.toggle('on', b.dataset.v===state.typeface); });\n  }\n\n  // Event wiring\n  document.getElementById('gear').addEventListener('click', function(){\n    document.getElementById('panel').classList.toggle('open');\n  });\n  document.getElementById('theme').addEventListener('change', function(e){ state.theme = e.target.value; applyState(); save(); });\n  document.getElementById('palette').addEventListener('change', function(e){ state.palette = e.target.value; applyState(); save(); });\n  document.getElementById('intensity').addEventListener('input', function(e){ state.intensity = +e.target.value; applyState(); save(); });\n  document.getElementById('blur').addEventListener('input', function(e){ state.blur = +e.target.value; applyState(); save(); });\n  document.getElementById('speed').addEventListener('input', function(e){ state.speed = +e.target.value; applyState(); save(); });\n  ['format24','showSeconds','showDate','showGreeting','ringsOn'].forEach(function(id){\n    document.getElementById(id).addEventListener('change', function(e){ state[id] = e.target.checked; applyState(); save(); });\n  });\n  document.querySelectorAll('[data-group] button').forEach(function(b){\n    b.addEventListener('click', function(){\n      var grp = b.parentElement.dataset.group;\n      state[grp] = b.dataset.v;\n      applyState(); save();\n    });\n  });\n\n  applyState();\n  setInterval(tick, 1000);\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
