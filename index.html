<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura Clock</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #ffffff;
    overflow: hidden;
    font-family: 'Outfit', sans-serif;
    color: #2a2a2a;
  }

  .stage {
    position: relative;
    width: min(92vmin, 480px);
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .aura {
    position: absolute;
    border-radius: 50%;
    filter: blur(70px);
    opacity: 0.42;
    animation: breathe 7s ease-in-out infinite;
    will-change: transform, opacity;
  }
  .aura-0 { width: 88%; height: 88%; background: radial-gradient(circle, #f43f5e 0%, transparent 70%); animation-delay: 0s; }
  .aura-1 { width: 82%; height: 82%; background: radial-gradient(circle, #ec4899 0%, transparent 70%); transform: translate(22px, -16px); animation-delay: -2.2s; }
  .aura-2 { width: 76%; height: 76%; background: radial-gradient(circle, #f59e0b 0%, transparent 70%); transform: translate(-22px, 16px); animation-delay: -4.4s; }

  @keyframes breathe {
    0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.42; }
    33%      { transform: scale(1.18) rotate(8deg); opacity: 0.42; }
    66%      { transform: scale(0.92) rotate(-5deg); opacity: 0.23; }
  }

  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(0, 0, 0, 0.08);
    pointer-events: none;
  }
  .ring.r1 { width: 86%; height: 86%; }
  .ring.r2 { width: 78%; height: 78%; animation: spin 120s linear infinite; }
  .ring.r3 { width: 70%; height: 70%; animation: spin 90s linear infinite reverse; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .ticks { position: absolute; width: 80%; height: 80%; }
  .tick {
    position: absolute;
    top: 50%; left: 50%;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.12);
    transform-origin: 0 0;
    transition: all 0.4s ease;
  }
  .tick.major { width: 5px; height: 5px; opacity: 0.85; }
  .tick.active {
    width: 7px; height: 7px;
    background: #f43f5e;
    box-shadow: 0 0 12px rgba(244, 63, 94, 0.65);
  }

  .progress {
    position: absolute;
    width: 84%; height: 84%;
    transform: rotate(-90deg);
  }
  .progress circle { fill: none; stroke-width: 1.2; stroke-linecap: round; }
  .progress .track { stroke: rgba(0, 0, 0, 0.08); }
  .progress .meter {
    stroke: url(#auraGradient);
    transition: stroke-dashoffset 0.9s ease;
    filter: drop-shadow(0 0 4px rgba(244, 63, 94, 0.6));
  }

  .display {
    position: relative;
    z-index: 5;
    text-align: center;
  }
  .time {
    font-size: clamp(48px, 11vmin, 78px);
    font-weight: 200;
    letter-spacing: 0.08em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .colon { display: inline-block; animation: blink 1s steps(2) infinite; opacity: 0.6; padding: 0 0.05em; }
  @keyframes blink { 50% { opacity: 0.15; } }

  .meta {
    margin-top: clamp(10px, 2.2vmin, 18px);
    font-size: clamp(10px, 1.6vmin, 12px);
    font-weight: 300;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    opacity: 0.5;
  }

  .noise {
    position: fixed; inset: 0;
    pointer-events: none;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }
</style>
</head>
<body>

<div class="noise"></div>

<div class="stage">
  <div class="aura aura-0"></div>
  <div class="aura aura-1"></div>
  <div class="aura aura-2"></div>

  <div class="ring r1"></div>
  <div class="ring r2"></div>
  <div class="ring r3"></div>

  <svg class="progress" viewBox="0 0 340 340">
    <defs>
      <linearGradient id="auraGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#f43f5e" />
        <stop offset="50%" stop-color="#ec4899" />
        <stop offset="100%" stop-color="#f59e0b" />
      </linearGradient>
    </defs>
    <circle class="track" cx="170" cy="170" r="168" />
    <circle class="meter" cx="170" cy="170" r="168" />
  </svg>

  <div class="ticks" id="ticks"></div>

  <div class="display">
    <div class="time">
      <span id="hh">--</span><span class="colon">:</span><span id="mm">--</span>
    </div>
    <div class="meta" id="meta"></div>
  </div>
</div>

<script>
  // Build tick dots
  var ticksEl = document.getElementById('ticks');
  for (var i = 0; i < 12; i++) {
    var dot = document.createElement('div');
    dot.className = 'tick' + (i % 3 === 0 ? ' major' : '');
    dot.dataset.idx = i;
    var angle = (i * 30 - 90) * (Math.PI / 180);
    var radius = 152;
    var x = Math.cos(angle) * radius;
    var y = Math.sin(angle) * radius;
    dot.style.transform = 'translate(' + x + 'px, ' + y + 'px)';
    ticksEl.appendChild(dot);
  }

  var DAYS   = ['Dimanche', 'Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi'];
  var MONTHS = ['Janvier', 'Février', 'Mars', 'Avril', 'Mai', 'Juin', 'Juillet', 'Août', 'Septembre', 'Octobre', 'Novembre', 'Décembre'];

  var meterEl = document.querySelector('.progress .meter');
  var C = 2 * Math.PI * 168;
  meterEl.setAttribute('stroke-dasharray', C);

  function pad(n) { return String(n).padStart(2, '0'); }

  function update() {
    var now = new Date();
    var h = now.getHours();
    var m = now.getMinutes();
    var s = now.getSeconds();

    document.getElementById('hh').textContent = pad(h);
    document.getElementById('mm').textContent = pad(m);
    document.getElementById('meta').textContent =
      DAYS[now.getDay()] + ' · ' + now.getDate() + ' ' + MONTHS[now.getMonth()];

    var minuteFrac = (m * 60 + s) / 3600;
    meterEl.setAttribute('stroke-dashoffset', C * (1 - minuteFrac));

    var active = h % 12;
    var dots = document.querySelectorAll('.tick');
    for (var j = 0; j < dots.length; j++) {
      dots[j].classList.toggle('active', j === active);
    }
  }

  update();
  setInterval(update, 1000);
</script>

</body>
</html>
